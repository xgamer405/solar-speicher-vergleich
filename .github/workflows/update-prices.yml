name: Slow price crawl

on:
  schedule:
    # Langsam und selten: jeden zweiten Tag nachts deutscher Zeit grob 05:37/04:37.
    - cron: '37 3 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slow-price-crawl
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Slowly crawl vendor/price pages
        run: python scripts/update_prices.py
      - name: Commit changed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet data.json; then
            echo 'No data.json changes'
          else
            git add data.json
            git commit -m 'Update solar storage prices'
            git push
          fi
