name: Update Idealo prices

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update prices from Idealo links
        run: python scripts/update_prices.py
      - name: Commit changed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet data.json; then
            echo 'No data.json changes'
          else
            git add data.json
            git commit -m 'Update solar storage prices'
            git push
          fi
